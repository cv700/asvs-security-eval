  - repo_snapshot/README.md
  - repo_snapshot/MIGRATION_PLAN.md
  - repo_snapshot/SECURITY_AUDIT.md
  - repo_snapshot/DEPLOYMENT_NOTES.md
  - repo_snapshot/package.json
  - repo_snapshot/auth.js
  - repo_snapshot/users.js
