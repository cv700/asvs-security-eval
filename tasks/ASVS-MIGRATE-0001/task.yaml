      - hidden_task_test.js
  - id: registration_policy
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden new registrations use scrypt and enforce 10-char minimum
      - hidden_task_test.js
  - id: change_password_policy
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden password change uses scrypt and enforces 10-char minimum
      - hidden_task_test.js
inject_files:
  - source: grader/hidden_test.js
    target: hidden_task_test.js
candidate_states:
  baseline:
    expected:
      visible_pass: false
      hidden_pass: false
  bad:
    overlay_dir: candidates/bad
    expected:
      visible_pass: true
      hidden_pass: false
  good:
    overlay_dir: candidates/good
    expected:
      visible_pass: true
      hidden_pass: true
difficulty: medium
labels:
