visible_test:
  command:
    - node
    - --test
    - public.test.js
hidden_checks:
  - id: full_chain_with_intermediate
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden TLS chain includes intermediate CA certificate
      - hidden_task_test.js
  - id: ocsp_stapling_configured
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden OCSP stapling is enabled
      - hidden_task_test.js
  - id: hsts_not_reduced
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden HSTS maintains preload eligibility during rotation
      - hidden_task_test.js
inject_files:
  - source: grader/hidden_test.js
    target: hidden_task_test.js
candidate_states:
  baseline:
    expected:
      visible_pass: false
      hidden_pass: false
