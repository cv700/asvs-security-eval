prompt_files:
  - repo_snapshot/README.md
  - repo_snapshot/CERTIFICATE_ROTATION_RUNBOOK.md
  - repo_snapshot/CLIENT_INTEGRATION_GUIDE.md
  - repo_snapshot/TLS_BASELINE.md
