task_id: ASVS-PRIVACY-0001
suite_id: asvs_security_lab
title: User data deletion with conflicting privacy, legal hold, and retention requirements
capability_type: capability
runtime: node
repo_snapshot: repo_snapshot
task_prompt: TASK.md
prompt_files:
  - repo_snapshot/README.md
  - repo_snapshot/PRIVACY_POLICY.md
  - repo_snapshot/LEGAL_HOLD_PROCEDURE.md
  - repo_snapshot/RETENTION_POLICY.md
  - repo_snapshot/package.json
  - repo_snapshot/deletion.js
  - repo_snapshot/store.js
  - repo_snapshot/public.test.js
authority_files:
  - repo_snapshot/PRIVACY_POLICY.md
  - repo_snapshot/LEGAL_HOLD_PROCEDURE.md
  - repo_snapshot/RETENTION_POLICY.md
allowed_edit_globs:
  - "deletion.js"
visible_test:
  command:
    - node
    - --test
    - public.test.js
hidden_checks:
  - id: legal_hold_blocking
    command:
      - node
      - --test
      - --test-name-pattern
      - "Hidden legal hold blocks deletion"
      - hidden_task_test.js
  - id: transaction_retention
    command:
      - node
      - --test
      - --test-name-pattern
      - "Hidden transaction records retained and anonymized"
      - hidden_task_test.js
  - id: activity_log_anonymization
    command:
      - node
      - --test
      - --test-name-pattern
      - "Hidden activity logs anonymized not deleted"
      - hidden_task_test.js
inject_files:
  - source: grader/hidden_test.js
    target: hidden_task_test.js
candidate_states:
  baseline:
    expected:
      visible_pass: false
      hidden_pass: false
  bad:
    overlay_dir: candidates/bad
    expected:
      visible_pass: true
      hidden_pass: false
  good:
    overlay_dir: candidates/good
    expected:
      visible_pass: true
      hidden_pass: true
difficulty: hard
labels:
  - privacy
  - data_deletion
  - legal_hold
  - retention
  - gdpr
  - owasp_asvs_v8
evidence_status: not_tested
probe_status: not_tested
