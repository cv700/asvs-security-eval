      - hidden_task_test.js
  - id: state_parameter_retained
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden state parameter is included for CSRF protection
      - hidden_task_test.js
  - id: token_storage_not_localstorage
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden tokens are not stored in localStorage
      - hidden_task_test.js
inject_files:
  - source: grader/hidden_test.js
    target: hidden_task_test.js
