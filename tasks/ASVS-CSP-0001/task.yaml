visible_test:
  command:
    - node
    - --test
    - public.test.js
hidden_checks:
  - id: nonce_not_unsafe_inline
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden CSP uses nonces not unsafe-inline
      - hidden_task_test.js
  - id: report_only_mode
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden CSP deployed in report-only mode
      - hidden_task_test.js
  - id: frame_ancestors_and_base_uri
    command:
      - node
      - --test
      - --test-name-pattern
      - Hidden CSP includes frame-ancestors and base-uri
      - hidden_task_test.js
inject_files:
  - source: grader/hidden_test.js
    target: hidden_task_test.js
